version: '3.8'

services:
  app:
    build: .
    container_name: bitwin_app
    ports:
      - "${APP_PORT:-8080}:80"
    volumes:
      - ./public:/var/www/html
      - ./src:/var/www/src
    environment:
      DB_HOST: ${DB_HOST}
      DB_NAME: ${DB_NAME}
      DB_USER: ${DB_USER}
      DB_PASS: ${DB_PASS}
    depends_on:
      - db

  db:
    image: mysql:8.0
    container_name: bitwin_db
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASS}
      MYSQL_DATABASE: ${DB_NAME}
      MYSQL_USER: ${DB_USER}
      MYSQL_PASSWORD: ${DB_PASS}
    volumes:
      - ./database/bitwin.sql:/docker-entrypoint-initdb.d/bitwin.sql
      - db_data:/var/lib/mysql

volumes:
  db_data:
